<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Italy Trip Weather</title>
  <style>
    :root {
      --accent: #2a7ad4;
      --bg: #f5f5f5;
      --card-bg: #ffffff;
      --border: #e5e5e5;
      --text: #1a1a1a;
      --text-muted: #777;
      --tab-h: 56px;
      --selector-h: 48px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      padding-bottom: calc(var(--tab-h) + 8px);
    }

    /* ── Loading overlay ── */
    #loading {
      display: none;
      position: fixed; inset: 0; z-index: 100;
      background: rgba(255,255,255,0.85);
      justify-content: center; align-items: center;
      flex-direction: column; gap: 12px;
    }
    #loading.active { display: flex; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Error banner ── */
    #error-banner {
      display: none;
      background: #fff3cd; border: 1px solid #ffc107;
      color: #664d03; padding: 10px 16px;
      font-size: 13px; text-align: center;
    }
    #error-banner.active { display: block; }

    /* ── Bottom tab bar ── */
    #tab-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--tab-h);
      background: #fff; border-top: 1px solid var(--border);
      display: flex; z-index: 50;
    }
    .tab-btn {
      flex: 1; border: none; background: none;
      font-size: 10px; color: var(--text-muted);
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2px;
      transition: color 0.15s; padding: 0 2px;
    }
    .tab-btn .tab-icon { font-size: 18px; line-height: 1; }
    .tab-btn.active { color: var(--accent); }

    /* ── Tab panels ── */
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Sticky selector bars ── */
    .selector-wrap {
      position: sticky; top: 0; z-index: 40;
      background: #fff;
      border-bottom: 1px solid var(--border);
    }
    .selector-bar {
      background: #fff;
      padding: 8px 12px;
      overflow-x: auto;
      white-space: nowrap;
      scrollbar-width: none;
      border-bottom: 1px solid var(--border);
    }
    .selector-bar:last-child { border-bottom: none; }
    .selector-bar::-webkit-scrollbar { display: none; }
    .pill {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      font-size: 13px;
      cursor: pointer;
      margin-right: 6px;
      background: #fff;
      color: var(--text);
      transition: background 0.12s, color 0.12s;
      white-space: nowrap;
    }
    .pill.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* ── Cards ── */
    .content-area {
      max-width: 480px;
      margin: 0 auto;
      padding: 12px;
    }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 12px;
      overflow: hidden;
    }
    .card-header {
      padding: 10px 14px;
      font-weight: 600;
      font-size: 15px;
      border-bottom: 1px solid var(--border);
      background: #fafafa;
    }
    .card-header .sub { font-size: 12px; font-weight: 400; color: var(--text-muted); margin-left: 6px; }

    /* ── Slot rows ── */
    .slot-row {
      display: grid;
      grid-template-columns: 88px 1fr 42px 46px 60px 44px;
      align-items: center;
      padding: 7px 10px;
      border-bottom: 1px solid var(--border);
      gap: 4px;
    }
    .slot-row:last-child { border-bottom: none; }
    .slot-name { font-size: 12px; color: var(--text-muted); }
    .slot-cond { font-size: 12px; display: flex; align-items: center; gap: 4px; }
    .slot-cond .icon { font-size: 16px; }
    .slot-temp { text-align: right; font-weight: 600; font-size: 14px; }
    .slot-rain {
      text-align: right; font-size: 12px; font-weight: 600;
      border-radius: 4px; padding: 2px 4px;
    }
    .rain-low  { background: #dbeafe; color: #1d4ed8; }
    .rain-mid  { background: #fef3c7; color: #92400e; }
    .rain-high { background: #fee2e2; color: #991b1b; }
    .slot-precip { text-align: right; font-size: 12px; color: var(--text-muted); }

    /* ── Heaviness badges ── */
    .badge {
      display: inline-block; font-size: 10px; font-weight: 600;
      padding: 2px 5px; border-radius: 4px; text-transform: uppercase;
    }
    .badge-dry      { background: #e5e5e5; color: #555; }
    .badge-light    { background: #dbeafe; color: #1d4ed8; }
    .badge-moderate { background: #fef3c7; color: #92400e; }
    .badge-heavy    { background: #fee2e2; color: #991b1b; }

    /* ── Fetch bar (always visible, above all tabs) ── */
    #fetch-bar {
      background: #fff; border-bottom: 1px solid var(--border);
      padding: 10px 14px;
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .fetch-btn {
      border: none; border-radius: 6px;
      padding: 7px 14px; font-size: 13px; font-weight: 600;
      cursor: pointer; white-space: nowrap;
    }
    .fetch-btn:active { opacity: 0.8; }
    .fetch-btn-om  { background: var(--accent); color: #fff; }
    .fetch-btn-met { background: #1a7a4a;       color: #fff; }
    #fetch-time { font-size: 12px; color: var(--text-muted); flex: 1; text-align: right; }
    #source-badge {
      font-size: 11px; font-weight: 600; padding: 2px 7px;
      border-radius: 10px; display: none;
    }
    #source-badge.om  { background: #dbeafe; color: #1d4ed8; display: inline-block; }
    #source-badge.met { background: #d1fae5; color: #065f46; display: inline-block; }

    /* ── Changes tab ── */
    #tab-changes .content-area { padding-top: 0; }

    /* Horizontal scroll strip */
    .changes-scroll {
      display: flex; flex-direction: row; gap: 10px;
      overflow-x: auto; padding: 4px 14px 12px;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }
    .changes-scroll::-webkit-scrollbar { display: none; }
    .change-city-card {
      flex: 0 0 82vw; max-width: 320px;
      scroll-snap-align: start;
      border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 14px; background: #fff;
      box-sizing: border-box;
    }
    .change-city-top  { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
    .change-city-name { font-size: 15px; font-weight: 700; }
    .change-city-country { font-size: 12px; color: var(--text-muted); }
    .sentiment-badge {
      display: inline-block; padding: 2px 9px; border-radius: 20px;
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
      margin-left: auto; white-space: nowrap; flex-shrink: 0;
    }
    .sentiment-positive   { background: #dcfce7; color: #15803d; }
    .sentiment-negative   { background: #fef3c7; color: #b45309; }
    .sentiment-balanced   { background: #e0f2fe; color: #0369a1; }
    .sentiment-none       { background: #f1f5f9; color: #64748b; }
    .change-bullets { list-style: none; margin: 0 0 8px; padding: 0; }
    .change-bullets li {
      font-size: 13px; line-height: 1.55; color: var(--text);
      padding: 2px 0 2px 16px; position: relative;
    }
    .change-bullets li::before { content: '•'; position: absolute; left: 4px; color: var(--text-muted); }
    .change-bullets li.pos::before { content: '↑'; color: #15803d; }
    .change-bullets li.neg::before { content: '↓'; color: #b45309; }
    .change-cycling { font-size: 12px; line-height: 1.55; color: #0369a1; padding: 6px 10px;
                      background: #f0f9ff; border-radius: 6px; }
    .change-cycling::before { content: '🚴 '; }
    .improve     { color: #15803d; }
    .deteriorate { color: #b45309; }
    .change-label { font-size: 11px; color: var(--text-muted); }

    .no-changes {
      text-align: center; padding: 40px 20px;
      color: var(--text-muted); font-size: 14px;
    }

    /* ── Guide tab sections ── */
    .section-title {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.6px; color: var(--text-muted);
      padding: 18px 14px 8px;
    }

    /* ── Itinerary cards ── */
    .itin-why {
      font-size: 13px; line-height: 1.65; color: var(--text);
      padding: 10px 14px 10px; border-bottom: 1px solid var(--border);
    }
    .itin-desc {
      font-size: 12px; color: var(--text-muted);
      padding: 6px 14px 10px; border-bottom: 1px solid var(--border);
    }
    .itin-row {
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
    }
    .itin-row:last-child { border-bottom: none; }
    .itin-top {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
    }
    .itin-date  { font-size: 11px; color: var(--text-muted); white-space: nowrap; min-width: 62px; }
    .itin-loc   { font-size: 13px; font-weight: 600; flex: 1; }
    .itin-wx    { display: flex; align-items: center; gap: 4px; font-size: 12px; white-space: nowrap; }
    .itin-act   { font-size: 12px; color: var(--text-muted); margin-top: 2px; padding-left: 68px; }

    /* ── Score badges & dots ── */
    .score-badge {
      font-size: 11px; font-weight: 600; padding: 2px 7px;
      border-radius: 10px; margin-left: 6px; vertical-align: middle;
    }
    .score-dot {
      display: inline-block; width: 9px; height: 9px;
      border-radius: 50%; flex-shrink: 0;
    }
    .score-great { background: #d1fae5; color: #065f46; }
    .score-good  { background: #dbeafe; color: #1d4ed8; }
    .score-ok    { background: #fef3c7; color: #92400e; }
    .score-poor  { background: #fee2e2; color: #991b1b; }
    .score-dot.score-great { background: #10b981; }
    .score-dot.score-good  { background: #3b82f6; }
    .score-dot.score-ok    { background: #f59e0b; }
    .score-dot.score-poor  { background: #ef4444; }
    .score-dot.score-none  { background: #ccc; }

    /* ── City Guide accordion ── */
    .city-section { border-top: 1px solid var(--border); }
    .city-section-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 11px 14px; cursor: pointer; user-select: none;
      font-size: 14px; font-weight: 600;
    }
    .city-section-header:active { background: #f5f5f5; }
    .city-section-chevron {
      font-size: 13px; color: var(--text-muted);
      transition: transform 0.2s;
      display: inline-block;
    }
    .city-section.open .city-section-chevron { transform: rotate(90deg); }
    .city-section-body { display: none; }
    .city-section.open .city-section-body { display: block; }
    .city-summary {
      font-size: 13px; color: var(--text-muted); line-height: 1.55;
      padding: 0 14px 10px; margin: 0;
    }

    /* ── Things to do items ── */
    .dd-item {
      padding: 10px 14px;
      border-top: 1px solid var(--border);
      display: flex; gap: 10px;
    }
    .dd-icon { font-size: 20px; flex-shrink: 0; line-height: 1.3; }
    .dd-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
    .dd-desc  { font-size: 12px; color: var(--text-muted); line-height: 1.5; }

    /* ── Cycling route items ── */
    .route-item {
      padding: 12px 14px;
      border-top: 1px solid var(--border);
    }
    .route-top {
      display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
      margin-bottom: 4px;
    }
    .route-name  { font-size: 13px; font-weight: 600; flex: 1; }
    .route-badges { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }
    .route-diff  {
      font-size: 10px; font-weight: 700; padding: 2px 6px;
      border-radius: 10px; text-transform: uppercase; white-space: nowrap;
    }
    .diff-easy       { background: #d1fae5; color: #065f46; }
    .diff-moderate   { background: #fef3c7; color: #92400e; }
    .diff-challenging{ background: #fee2e2; color: #991b1b; }
    .route-scenic {
      font-size: 11px; font-weight: 600; color: #7c3aed;
      background: #f3e8ff; padding: 2px 6px; border-radius: 10px;
      white-space: nowrap;
    }
    .route-meta  { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
    .route-desc  { font-size: 12px; color: var(--text-muted); line-height: 1.5; margin-bottom: 8px; }
    .route-map {
      width: 100%; height: 150px; border: 1px solid var(--border);
      border-radius: 8px; margin-bottom: 6px;
      display: block;
    }
    .route-map-btn {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 600; color: #1a73e8;
      background: #e8f0fe; border: none; border-radius: 8px;
      padding: 6px 12px; cursor: pointer; text-decoration: none;
      margin-bottom: 4px;
    }
    .route-map-btn:active { background: #d2e3fc; }

    /* ── Responsive ── */
    @media (min-width: 520px) {
      .slot-name { font-size: 13px; }
    }
  </style>
</head>
<body>

<!-- Loading overlay -->
<div id="loading">
  <div class="spinner"></div>
  <span style="color:#555;font-size:14px;">Fetching weather data…</span>
</div>

<!-- Error banner -->
<div id="error-banner"></div>

<!-- Fetch bar — always visible above tabs -->
<div id="fetch-bar">
  <button class="fetch-btn fetch-btn-om"  onclick="doFetchOM()">↻ Open-Meteo</button>
  <button class="fetch-btn fetch-btn-met" onclick="doFetchMET()">↻ MET Norway</button>
  <span id="source-badge"></span>
  <span id="fetch-time"></span>
</div>

<!-- ══ TAB: City Guide ══ -->
<div id="tab-cityguide" class="tab-panel active">
  <div class="content-area" id="cityguide-content"></div>
</div>

<!-- ══ TAB: Weather Guide ══ -->
<div id="tab-weather" class="tab-panel">
  <div class="content-area" id="weather-content"></div>
</div>

<!-- ══ TAB: By Day ══ -->
<div id="tab-day" class="tab-panel">
  <div class="selector-wrap">
    <div class="selector-bar" id="city-pills"></div>
    <div class="selector-bar" id="day-slot-pills"></div>
  </div>
  <div class="content-area" id="day-content"></div>
</div>

<!-- ══ TAB: By City ══ -->
<div id="tab-city" class="tab-panel">
  <div class="selector-wrap">
    <div class="selector-bar" id="day-pills"></div>
    <div class="selector-bar" id="city-slot-pills"></div>
  </div>
  <div class="content-area" id="city-content"></div>
</div>

<!-- Bottom tab bar -->
<div id="tab-bar">
  <button class="tab-btn active" onclick="showTab('cityguide')" id="btn-cityguide">
    <span class="tab-icon">🏙️</span>City Guide
  </button>
  <button class="tab-btn" onclick="showTab('weather')" id="btn-weather">
    <span class="tab-icon">🌤️</span>Weather Guide
  </button>
  <button class="tab-btn" onclick="showTab('day')" id="btn-day">
    <span class="tab-icon">🌆</span>Weather by City
  </button>
  <button class="tab-btn" onclick="showTab('city')" id="btn-city">
    <span class="tab-icon">📆</span>Weather by Day
  </button>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════════

const LOCATIONS = [
  { name: 'Innsbruck',           country: 'Austria', lat: 47.2682, lon: 11.3933 },
  { name: 'Achensee',            country: 'Austria', lat: 47.4200, lon: 11.7150 },
  { name: 'Bolzano',             country: 'Italy',   lat: 46.4985, lon: 11.3548 },
  { name: 'Riva del Garda',      country: 'Italy',   lat: 45.8850, lon: 10.8419 },
  { name: 'Malcesine',           country: 'Italy',   lat: 45.7644, lon: 10.8229 },
  { name: 'Peschiera del Garda', country: 'Italy',   lat: 45.4389, lon: 10.6841 },
  { name: 'Verona',              country: 'Italy',   lat: 45.4384, lon: 10.9811 },
  { name: 'Venice',              country: 'Italy',   lat: 45.4371, lon: 12.3345 },
  { name: 'Bologna',             country: 'Italy',   lat: 44.4937, lon: 11.3386 },
  { name: 'Rimini',              country: 'Italy',   lat: 44.0573, lon: 12.5670 },
];

// Time slot definitions (hour of day in local time)
const SLOTS = [
  { name: 'Morning',          hours: [7,8,9,10] },
  { name: 'Early afternoon',  hours: [11,12,13,14] },
  { name: 'Late afternoon',   hours: [15,16,17,18] },
  { name: 'Evening',          hours: [19,20,21,22] },
  { name: 'Night',            hours: [23,0,1,2,3,4,5,6] },
];

// WMO weather interpretation code → { label, icon }
function weatherCodeInfo(code) {
  if (code === 0)                    return { label: 'Sunny',        icon: '☀️' };
  if (code <= 2)                     return { label: 'Partly cloudy', icon: '🌤' };
  if (code === 3)                    return { label: 'Cloudy',        icon: '☁️' };
  if (code >= 45 && code <= 48)      return { label: 'Foggy',         icon: '🌫' };
  if (code >= 51 && code <= 57)      return { label: 'Drizzle',       icon: '🌦' };
  if (code >= 61 && code <= 67)      return { label: 'Rain',          icon: '🌧' };
  if (code >= 71 && code <= 77)      return { label: 'Snow',          icon: '❄️' };
  if (code >= 80 && code <= 82)      return { label: 'Rain',          icon: '🌧' };
  if (code >= 85 && code <= 86)      return { label: 'Snow',          icon: '❄️' };
  if (code >= 95 && code <= 99)      return { label: 'Thunderstorm',  icon: '⛈' };
  return { label: 'Cloudy', icon: '🌥' };
}

// ═══════════════════════════════════════════════════════════════
// DATA FETCHING — Open-Meteo
// ═══════════════════════════════════════════════════════════════

async function fetchLocationOM(loc) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}` +
    `&hourly=temperature_2m,precipitation_probability,precipitation,weathercode` +
    `&timezone=Europe%2FRome&forecast_days=10`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status} for ${loc.name}`);
  const data = await res.json();
  data._source = 'om';
  return data;
}

async function doFetchOM() {
  showLoading(true);
  hideError();
  try {
    const results = await Promise.all(LOCATIONS.map(fetchLocationOM));
    storeResults(results, 'om');
    renderAll();
  } catch (err) {
    showError('Could not reach Open-Meteo. (' + err.message + ')');
    renderAll();
  } finally {
    showLoading(false);
  }
}

// ═══════════════════════════════════════════════════════════════
// DATA FETCHING — MET Norway (api.met.no Locationforecast 2.0)
// ═══════════════════════════════════════════════════════════════

// MET Norway symbol_code → rain probability estimate and condition info
function metSymbolInfo(symbol) {
  if (!symbol) return { label: 'Cloudy', icon: '🌥', rainProb: 10 };
  const s = symbol.split('_')[0]; // strip _day/_night suffix
  const map = {
    clearsky:        { label: 'Sunny',         icon: '☀️', rainProb: 0  },
    fair:            { label: 'Partly cloudy',  icon: '🌤', rainProb: 5  },
    partlycloudy:    { label: 'Partly cloudy',  icon: '⛅', rainProb: 10 },
    cloudy:          { label: 'Cloudy',         icon: '☁️', rainProb: 15 },
    fog:             { label: 'Foggy',          icon: '🌫', rainProb: 20 },
    lightrain:       { label: 'Light rain',     icon: '🌦', rainProb: 60 },
    rain:            { label: 'Rain',           icon: '🌧', rainProb: 80 },
    heavyrain:       { label: 'Heavy rain',     icon: '🌧', rainProb: 95 },
    lightsleet:      { label: 'Light sleet',    icon: '🌨', rainProb: 55 },
    sleet:           { label: 'Sleet',          icon: '🌨', rainProb: 75 },
    heavysleet:      { label: 'Heavy sleet',    icon: '🌨', rainProb: 90 },
    lightsnow:       { label: 'Light snow',     icon: '❄️', rainProb: 50 },
    snow:            { label: 'Snow',           icon: '❄️', rainProb: 70 },
    heavysnow:       { label: 'Heavy snow',     icon: '❄️', rainProb: 85 },
    lightrainshowers:{ label: 'Light showers',  icon: '🌦', rainProb: 50 },
    rainshowers:     { label: 'Showers',        icon: '🌧', rainProb: 70 },
    heavyrainshowers:{ label: 'Heavy showers',  icon: '🌧', rainProb: 90 },
    thunderstorm:    { label: 'Thunderstorm',   icon: '⛈', rainProb: 95 },
  };
  return map[s] || { label: 'Cloudy', icon: '🌥', rainProb: 10 };
}

async function fetchLocationMET(loc) {
  // Note: User-Agent is a forbidden header in Fetch — browsers send their own automatically.
  // Setting it explicitly causes "Load failed" on iOS Safari, so we omit it entirely.
  const url = `https://api.met.no/weatherapi/locationforecast/2.0/compact?lat=${loc.lat}&lon=${loc.lon}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status} for ${loc.name}`);
  const raw = await res.json();

  // Normalise MET Norway response into the same shape as Open-Meteo hourly arrays
  // so buildLocationDays() can consume it unchanged.
  // MET Norway provides next_1_hours for ~3 days, then switches to next_6_hours.
  // We expand 6-hour blocks into 6 synthetic hourly entries so we get a full 10 days.
  const times = [], temperature_2m = [], precipitation_probability = [],
        precipitation = [], weathercode = [];

  for (const entry of raw.properties.timeseries) {
    const entryMs  = new Date(entry.time).getTime();
    const instant  = entry.data.instant.details;
    const next1h   = entry.data.next_1_hours;
    const next6h   = entry.data.next_6_hours;

    if (next1h) {
      // ── 1-hour block ──
      const symbol = next1h.summary?.symbol_code || '';
      const { rainProb } = metSymbolInfo(symbol);
      const localStr = utcMsToRomeLocal(entryMs);
      times.push(localStr);
      temperature_2m.push(instant.air_temperature);
      precipitation_probability.push(rainProb);
      precipitation.push(next1h.details?.precipitation_amount ?? 0);
      weathercode.push(symbol);

    } else if (next6h) {
      // ── 6-hour block: spread across 6 synthetic hourly entries ──
      const symbol = next6h.summary?.symbol_code || '';
      const { rainProb } = metSymbolInfo(symbol);
      const totalPrecip = next6h.details?.precipitation_amount ?? 0;
      const precipPerHour = parseFloat((totalPrecip / 6).toFixed(2));

      for (let h = 0; h < 6; h++) {
        const localStr = utcMsToRomeLocal(entryMs + h * 3600000);
        times.push(localStr);
        temperature_2m.push(instant.air_temperature);
        precipitation_probability.push(rainProb);
        precipitation.push(precipPerHour);
        weathercode.push(symbol);
      }
    }
    // next_12_hours only (no 1h or 6h) — skip; covered by surrounding 6h blocks
  }

  return {
    _source: 'met',
    hourly: { time: times, temperature_2m, precipitation_probability, precipitation, weathercode }
  };
}

// Convert UTC milliseconds → Rome local time string "YYYY-MM-DDTHH:MM"
// Uses a fixed +2h offset (CEST, valid May–Oct for the Italy/Austria trip window)
function utcMsToRomeLocal(ms) {
  const local = new Date(ms + 2 * 3600 * 1000);
  return local.toISOString().slice(0, 16); // drop seconds and Z
}

async function doFetchMET() {
  showLoading(true);
  hideError();
  try {
    const results = await Promise.all(LOCATIONS.map(fetchLocationMET));
    storeResults(results, 'met');
    renderAll();
  } catch (err) {
    showError('Could not reach MET Norway. (' + err.message + ')');
    renderAll();
  } finally {
    showLoading(false);
  }
}

// ═══════════════════════════════════════════════════════════════
// STORE FETCH RESULTS
// ═══════════════════════════════════════════════════════════════

function storeResults(results, source) {
  const current = localStorage.getItem('weather_current');
  if (current) {
    localStorage.setItem('weather_previous', current);
    const prevTime = localStorage.getItem('weather_fetched_at');
    if (prevTime) localStorage.setItem('weather_previous_fetched_at', prevTime);
  }
  localStorage.setItem('weather_current', JSON.stringify(results));
  localStorage.setItem('weather_fetched_at', new Date().toISOString());
  localStorage.setItem('weather_source', source);
}

// ═══════════════════════════════════════════════════════════════
// DATA AGGREGATION
// ═══════════════════════════════════════════════════════════════

// Given raw API response for one location, build: days[] where each day has slots[]
function buildLocationDays(apiData) {
  const times       = apiData.hourly.time;               // "2025-06-04T07:00"
  const temps       = apiData.hourly.temperature_2m;
  const rainProbs   = apiData.hourly.precipitation_probability;
  const precips     = apiData.hourly.precipitation;
  const codes       = apiData.hourly.weathercode;

  // Group by date
  const byDate = {};
  times.forEach((t, i) => {
    const [dateStr, timeStr] = t.split('T');
    const hour = parseInt(timeStr.split(':')[0], 10);
    if (!byDate[dateStr]) byDate[dateStr] = [];
    byDate[dateStr].push({ hour, temp: temps[i], rainProb: rainProbs[i], precip: precips[i], code: codes[i] });
  });

  const dates = Object.keys(byDate).sort();

  return dates.map(dateStr => {
    const entries = byDate[dateStr];
    // Build a lookup: hour → entry (for same-day hours)
    const byHour = {};
    entries.forEach(e => { byHour[e.hour] = e; });

    const slots = SLOTS.map(slotDef => {
      // For the Night slot, hours 0-6 belong to the *next* calendar day in the API
      // We pick hours from the current date's entries, so 23:00 of this date
      // and 00:00–06:00 of the next date. We handle this by also checking the next date.
      const nextDateStr = dates[dates.indexOf(dateStr) + 1];
      const nextByHour = nextDateStr
        ? Object.fromEntries((byDate[nextDateStr] || []).map(e => [e.hour, e]))
        : {};

      const relevant = slotDef.hours
        .map(h => {
          if (h >= 23) return byHour[h];           // same date (23:xx)
          if (h <= 6)  return nextByHour[h];        // next date (00–06:xx)
          return byHour[h];
        })
        .filter(Boolean);

      if (!relevant.length) return null;

      const maxTemp      = Math.round(Math.max(...relevant.map(e => e.temp)));
      const maxRainProb  = Math.round(Math.max(...relevant.map(e => e.rainProb ?? 0)));
      const totalPrecip  = parseFloat(relevant.reduce((s, e) => s + (e.precip ?? 0), 0).toFixed(1));
      const heaviness    = precipHeaviness(totalPrecip);

      // Dominant condition: pick entry with worst weather
      // Codes may be WMO integers (Open-Meteo) or symbol strings (MET Norway)
      const dominantEntry = relevant.reduce((best, e) => {
        const sev = typeof e.code === 'string' ? metSymbolInfo(e.code).rainProb : codeSeverity(e.code);
        const bestSev = typeof best.code === 'string' ? metSymbolInfo(best.code).rainProb : codeSeverity(best.code);
        return sev > bestSev ? e : best;
      }, relevant[0]);
      const { label, icon } = typeof dominantEntry.code === 'string'
        ? metSymbolInfo(dominantEntry.code)
        : weatherCodeInfo(dominantEntry.code);

      return { name: slotDef.name, icon, condition: label, maxTemp, maxRainProb, totalPrecip, heaviness };
    });

    return { date: dateStr, slots };
  });
}

function codeSeverity(code) {
  if (code >= 95) return 7;
  if (code >= 80) return 6;
  if (code >= 61) return 5;
  if (code >= 51) return 4;
  if (code >= 45) return 3;
  if (code === 3)  return 2;
  if (code <= 2)   return 1;
  return 0;
}

function precipHeaviness(mm) {
  if (mm <= 0.2) return 'dry';
  if (mm <= 2)   return 'light';
  if (mm <= 6)   return 'moderate';
  return 'heavy';
}

// Build full dataset from raw API array (one entry per location)
function buildAllData(rawArray) {
  return rawArray.map((apiData, i) => ({
    location: LOCATIONS[i],
    days: buildLocationDays(apiData),
  }));
}

// ═══════════════════════════════════════════════════════════════
// RENDERING HELPERS
// ═══════════════════════════════════════════════════════════════

function rainClass(prob) {
  if (prob <= 20) return 'rain-low';
  if (prob <= 50) return 'rain-mid';
  return 'rain-high';
}

function badgeClass(heaviness) {
  return 'badge badge-' + heaviness;
}

function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
}

function slotRowHTML(slot) {
  if (!slot) return '';
  return `<div class="slot-row">
    <span class="slot-name">${slot.name}</span>
    <span class="slot-cond"><span class="icon">${slot.icon}</span><span>${slot.condition}</span></span>
    <span class="slot-temp">${slot.maxTemp}°</span>
    <span class="slot-rain ${rainClass(slot.maxRainProb)}">${slot.maxRainProb}%</span>
    <span class="${badgeClass(slot.heaviness)}">${slot.heaviness}</span>
    <span class="slot-precip">${slot.totalPrecip}mm</span>
  </div>`;
}

// Slot filter names — index 0 = "All", 1–5 match SLOTS indices
const SLOT_FILTER_LABELS = ['All', 'Morning', 'Early afternoon', 'Late afternoon', 'Evening', 'Night'];

function slotPillsHTML(selectedSlot, onclickFn) {
  return SLOT_FILTER_LABELS.map((label, i) =>
    `<span class="pill${i === selectedSlot ? ' active' : ''}" onclick="${onclickFn}(${i})">${label}</span>`
  ).join('');
}

// Return the slots of a day filtered by the selected slot index (0 = all)
function filteredSlots(day, selectedSlot) {
  if (selectedSlot === 0) return day.slots;
  const s = day.slots[selectedSlot - 1]; // index 1→slot[0], etc.
  return s ? [s] : [];
}

function dayCardHTML(day, selectedSlot) {
  const slots = filteredSlots(day, selectedSlot);
  if (!slots.length) return '';
  return `<div class="card">
    <div class="card-header">${formatDate(day.date)}</div>
    ${slots.map(slotRowHTML).join('')}
  </div>`;
}

// ═══════════════════════════════════════════════════════════════
// TAB: GUIDE — Changes section
// ═══════════════════════════════════════════════════════════════

function changesHTML(currentData, previousData) {
  if (!currentData) {
    return `<div class="no-changes">No data loaded yet. Tap a fetch button above.</div>`;
  }
  if (!previousData) {
    return `<div class="no-changes">No previous fetch to compare against.<br>Fetch again later to see what changed.</div>`;
  }

  let html = '';
  let anyChange = false;

  currentData.forEach((locData, li) => {
    const prevLocData = previousData[li];
    if (!prevLocData) return;

    // Accumulate per-city signals
    let posCount = 0, negCount = 0;
    const tempUps = [], tempDowns = [], rainUps = [], rainDowns = [];

    locData.days.forEach((day, di) => {
      const prevDay = prevLocData.days[di];
      if (!prevDay) return;
      day.slots.forEach((slot, si) => {
        const prevSlot = prevDay.slots[si];
        if (!slot || !prevSlot) return;
        const tempDiff = slot.maxTemp - prevSlot.maxTemp;
        if (Math.abs(tempDiff) >= 2) {
          if (tempDiff > 0) { posCount++; tempUps.push({ date: day.date, slot: slot.name, diff: tempDiff, now: slot.maxTemp }); }
          else              { negCount++; tempDowns.push({ date: day.date, slot: slot.name, diff: tempDiff, now: slot.maxTemp }); }
        }
        const rainDiff = slot.maxRainProb - prevSlot.maxRainProb;
        if (Math.abs(rainDiff) >= 20) {
          if (rainDiff < 0) { posCount++; rainDowns.push({ date: day.date, slot: slot.name, diff: rainDiff, now: slot.maxRainProb }); }
          else              { negCount++; rainUps.push({ date: day.date, slot: slot.name, diff: rainDiff, now: slot.maxRainProb }); }
        }
      });
    });

    const total = posCount + negCount;
    if (total === 0) return; // no meaningful change for this city

    anyChange = true;

    // Sentiment label
    let sentiment, sentClass;
    if (posCount > 0 && negCount === 0)            { sentiment = 'Mainly positive'; sentClass = 'sentiment-positive'; }
    else if (negCount > 0 && posCount === 0)        { sentiment = 'Mainly negative'; sentClass = 'sentiment-negative'; }
    else if (posCount >= negCount * 2)              { sentiment = 'Mainly positive'; sentClass = 'sentiment-positive'; }
    else if (negCount >= posCount * 2)              { sentiment = 'Mainly negative'; sentClass = 'sentiment-negative'; }
    else                                            { sentiment = 'Balanced';        sentClass = 'sentiment-balanced'; }

    // Build bullet list of changes (grouped by day, not slot)
    // Aggregate per-date: best temp gain, worst temp drop, best rain drop, worst rain rise
    const byDate = {};
    const addEntry = (arr, key, cls) => arr.forEach(e => {
      if (!byDate[e.date]) byDate[e.date] = {};
      if (!byDate[e.date][key] || Math.abs(e.diff) > Math.abs(byDate[e.date][key].diff))
        byDate[e.date][key] = { ...e, cls };
    });
    addEntry(tempUps,   'tempUp',   'pos');
    addEntry(tempDowns, 'tempDown', 'neg');
    addEntry(rainDowns, 'rainDown', 'pos');
    addEntry(rainUps,   'rainUp',   'neg');

    const bullets = [];
    Object.keys(byDate).sort().forEach(date => {
      const d = byDate[date];
      if (d.tempUp)   bullets.push({ cls:'pos', text:`${formatDate(date)}: warmer (+${d.tempUp.diff}°, now ${d.tempUp.now}°)` });
      if (d.tempDown) bullets.push({ cls:'neg', text:`${formatDate(date)}: cooler (${d.tempDown.diff}°, now ${d.tempDown.now}°)` });
      if (d.rainDown) bullets.push({ cls:'pos', text:`${formatDate(date)}: less rain (${d.rainDown.diff}pp, now ${d.rainDown.now}%)` });
      if (d.rainUp)   bullets.push({ cls:'neg', text:`${formatDate(date)}: more rain (+${d.rainUp.diff}pp, now ${d.rainUp.now}%)` });
    });
    const bulletsHTML = `<ul class="change-bullets">${bullets.slice(0,5).map(b =>
      `<li class="${b.cls}">${b.text}</li>`).join('')}</ul>`;

    // Cycling recommendation: focus on best/worst days to visit
    // Find the best and worst days in the current forecast for this city
    const dayScores = locData.days.map(day => {
      const slots = day.slots.filter(Boolean);
      if (!slots.length) return null;
      const maxRain = Math.max(...slots.map(s => s.maxRainProb));
      const avgTemp = Math.round(slots.reduce((s, e) => s + e.maxTemp, 0) / slots.length);
      const score = 100 - maxRain * 0.75 - (avgTemp < 17 ? (17 - avgTemp) * 2 : 0);
      return { date: day.date, score: Math.round(score), maxRain, avgTemp };
    }).filter(Boolean);

    dayScores.sort((a, b) => b.score - a.score);
    const bestDays  = dayScores.slice(0, 2);
    const worstDays = dayScores.slice(-2).reverse();

    let cycling = '';
    if (sentClass === 'sentiment-positive') {
      cycling = `Best days to be in ${locData.location.name}: ${bestDays.map(d => formatDate(d.date)).join(' and ')} — the forecast improvement makes these ideal for a full ride. ${negCount > 0 ? `Avoid ${worstDays[0] ? formatDate(worstDays[0].date) : 'the rainier days'} if you can.` : ''}`.trim();
    } else if (sentClass === 'sentiment-negative') {
      cycling = `The forecast for ${locData.location.name} has deteriorated — ${worstDays.map(d => formatDate(d.date)).join(' and ')} now look risky. If you have flexibility, ${bestDays[0] ? formatDate(bestDays[0].date) : 'an earlier day'} still holds up best.`;
    } else {
      cycling = `${locData.location.name} has mixed changes — ${bestDays[0] ? formatDate(bestDays[0].date) : 'the first few days'} remain your strongest cycling window based on the updated forecast.`;
    }

    html += `<div class="change-city-card">
      <div class="change-city-top">
        <div>
          <span class="change-city-name">${locData.location.name}</span>
          <span class="change-city-country"> · ${locData.location.country}</span>
        </div>
        <span class="sentiment-badge ${sentClass}">${sentiment}</span>
      </div>
      ${bulletsHTML}
      <div class="change-cycling">${cycling}</div>
    </div>`;
  });

  return anyChange
    ? `<div class="changes-scroll">${html}</div>`
    : `<div class="no-changes">No significant changes since last refresh.</div>`;
}

// Score a day-at-location for cycling/activity suitability (0–100)
function scoreDayForActivity(dayData, slotIndices) {
  if (!dayData) return null;
  const relevant = slotIndices.map(i => dayData.slots[i]).filter(Boolean);
  if (!relevant.length) return null;
  const maxRain   = Math.max(...relevant.map(s => s.maxRainProb));
  const maxTemp   = Math.max(...relevant.map(s => s.maxTemp));
  const totPrecip = relevant.reduce((s, e) => s + e.totalPrecip, 0);
  let score = 100 - maxRain * 0.75 - totPrecip * 6;
  // Cold penalty (below 17°C) — cycling in cold rain is miserable
  if (maxTemp < 17) score -= (17 - maxTemp) * 2;
  score = Math.max(0, Math.min(100, Math.round(score)));
  // Representative slot: worst rain probability
  const repSlot = relevant.reduce((w, s) => s.maxRainProb > w.maxRainProb ? s : w, relevant[0]);
  return { score, maxRain, maxTemp, repSlot };
}

function scoreLabel(score) {
  if (score === null) return { text: '—',    cls: 'score-none'  };
  if (score >= 75)    return { text: 'Great', cls: 'score-great' };
  if (score >= 55)    return { text: 'Good',  cls: 'score-good'  };
  if (score >= 35)    return { text: 'OK',    cls: 'score-ok'    };
  return               { text: 'Poor',  cls: 'score-poor'  };
}

function itineraryCardHTML(itin, data) {
  let totalScore = 0, scored = 0;

  const rows = itin.days.map(day => {
    const locData  = data ? data[day.locIdx] : null;
    const dayData  = locData?.days.find(d => d.date === day.date);
    const result   = scoreDayForActivity(dayData, day.slots);
    if (result !== null) { totalScore += result.score; scored++; }
    return { day, result };
  });

  const avgScore = scored ? Math.round(totalScore / scored) : null;
  const { text: scoreTxt, cls: scoreCls } = scoreLabel(avgScore);

  let html = `<div class="card">
    <div class="card-header">${itin.name} <span class="score-badge ${scoreCls}">${scoreTxt}</span></div>
    <div class="itin-desc">${itin.desc}</div>`;

  rows.forEach(({ day, result }) => {
    const dateLabel = formatDate(day.date);
    let wx = '';
    if (result) {
      const { text, cls } = scoreLabel(result.score);
      wx = `<span class="itin-wx">
              ${result.repSlot.icon} ${result.maxTemp}°&thinsp;
              <span class="${rainClass(result.maxRain)}" style="border-radius:3px;padding:1px 4px;font-size:11px;">${result.maxRain}%</span>
              <span class="score-dot ${cls}"></span>
            </span>`;
    } else {
      wx = `<span class="itin-wx" style="color:var(--text-muted)">no data</span>`;
    }
    html += `<div class="itin-row">
      <div class="itin-top">
        <span class="itin-date">${dateLabel}</span>
        <span class="itin-loc">${day.loc}</span>
        ${wx}
      </div>
      <div class="itin-act">${day.activity}</div>
    </div>`;
  });

  html += '</div>';
  return html;
}

function travelHTML(data) {
  if (!data) return ITINERARIES.map(itin => itineraryCardHTML(itin, data)).join('');

  // Score both itineraries and pick the better one
  const scored = ITINERARIES.map(itin => {
    let total = 0, count = 0;
    itin.days.forEach(day => {
      const locData = data[day.locIdx];
      const dayData = locData?.days.find(d => d.date === day.date);
      const r = scoreDayForActivity(dayData, day.slots);
      if (r !== null) { total += r.score; count++; }
    });
    return { itin, avg: count ? Math.round(total / count) : 0 };
  });

  scored.sort((a, b) => b.avg - a.avg);
  const winner = scored[0];
  const loser  = scored[1];
  const diff   = winner.avg - loser.avg;

  // Build the "why" explanation
  // Find the 2 best cycling days and 1 worst day in the winning route
  const winnerDayResults = winner.itin.days.map(day => {
    const locData = data[day.locIdx];
    const dayData = locData?.days.find(d => d.date === day.date);
    const r = scoreDayForActivity(dayData, day.slots);
    return { day, r };
  }).filter(x => x.r !== null);
  winnerDayResults.sort((a, b) => b.r.score - a.r.score);
  const bestDays  = winnerDayResults.slice(0, 2);
  const worstDay  = winnerDayResults[winnerDayResults.length - 1];

  const bestNames  = bestDays.map(x => `${x.day.loc} on ${formatDate(x.day.date)} (${x.r.maxTemp}°, ${x.r.maxRain}% rain)`).join(' and ');
  const worstDesc  = worstDay ? `${worstDay.day.loc} on ${formatDate(worstDay.day.date)} (${worstDay.r.maxRain}% rain chance)` : '';

  let why = `Based on the current forecast, <strong>${winner.itin.name}</strong> scores ${winner.avg}/100 on average — `;
  if (diff >= 10) {
    why += `clearly ahead of the alternative (${loser.itin.name} scores ${loser.avg}/100). `;
  } else {
    why += `narrowly edging out ${loser.itin.name} (${loser.avg}/100). `;
  }
  why += `Your best cycling days on this route are ${bestNames}. `;
  if (worstDesc) {
    why += `The trickiest day is ${worstDesc} — keep that one flexible or plan a shorter ride. `;
  }
  why += winner.avg >= 70
    ? `Overall the weather looks very promising — go for it.`
    : winner.avg >= 50
    ? `Overall conditions are decent; pack a rain layer just in case.`
    : `Overall the forecast is mixed — stay flexible and check again closer to departure.`;

  const cardHTML = itineraryCardHTML(winner.itin, data);
  // Inject the "why" block right after the itin-desc
  return cardHTML.replace(
    `<div class="itin-desc">`,
    `<div class="itin-why">${why}</div><div class="itin-desc">`
  );
}

// Accordion state: key = "cityIdx-section" (e.g. "3-things"), value = true/false
const openSections = {};

function toggleCitySection(cityIdx, section) {
  const key = `${cityIdx}-${section}`;
  openSections[key] = !openSections[key];
  const el = document.getElementById(`section-${cityIdx}-${section}`);
  if (!el) return;
  el.classList.toggle('open', !!openSections[key]);
  // Lazy-load OSM iframes on first open
  if (openSections[key]) {
    el.querySelectorAll('iframe[data-src]').forEach(f => {
      f.src = f.dataset.src;
      f.removeAttribute('data-src');
    });
  }
}

function cityGuideHTML() {
  return LOCATIONS.map((loc, i) => {
    const info = CITY_INFO[i];
    const deep = CITY_DEEPDIVE[i];

    // Things to do items
    const thingsBody = `<p class="city-summary">${info.vacation}</p>` +
      deep.things.map(t => `
        <div class="dd-item">
          <span class="dd-icon">${t.icon}</span>
          <div>
            <div class="dd-title">${t.title}</div>
            <div class="dd-desc">${t.desc}</div>
          </div>
        </div>`).join('');

    // Cycling route items
    const routesBody = `<p class="city-summary">${info.cycling}</p>` +
      deep.routes.map(r => {
        const mapsUrl = `https://www.google.com/maps/search/${encodeURIComponent(r.name + ', ' + loc.name)}`;
        const osmSrc  = `https://www.openstreetmap.org/export/embed.html?bbox=${r.bbox.join(',')}&layer=cyclemap`;
        return `
        <div class="route-item">
          <div class="route-top">
            <span class="route-name">${r.name}</span>
            <span class="route-badges">
              <span class="route-diff diff-${r.diff}">${r.diff}</span>
              <span class="route-scenic">🏔 ${r.scenic}/10</span>
            </span>
          </div>
          <div class="route-meta">${r.km} km · ${r.elev} m elevation</div>
          <div class="route-desc">${r.desc}</div>
          <iframe class="route-map" data-src="${osmSrc}" loading="lazy" frameborder="0" allowfullscreen></iframe>
          <a class="route-map-btn" href="${mapsUrl}" target="_blank" rel="noopener">📍 Open in Google Maps</a>
        </div>`;
      }).join('');

    const thingsOpen  = openSections[`${i}-things`]  ? ' open' : '';
    const cyclingOpen = openSections[`${i}-cycling`] ? ' open' : '';

    return `<div class="card">
      <div class="card-header">${loc.name}<span class="sub">${loc.country}</span></div>
      <div class="city-section${thingsOpen}" id="section-${i}-things">
        <div class="city-section-header" onclick="toggleCitySection(${i}, 'things')">
          <span>🏖 Things to do</span>
          <span class="city-section-chevron">›</span>
        </div>
        <div class="city-section-body">${thingsBody}</div>
      </div>
      <div class="city-section${cyclingOpen}" id="section-${i}-cycling">
        <div class="city-section-header" onclick="toggleCitySection(${i}, 'cycling')">
          <span>🚴 Cycling routes</span>
          <span class="city-section-chevron">›</span>
        </div>
        <div class="city-section-body">${routesBody}</div>
      </div>
    </div>`;
  }).join('');
}

// (modal removed — city deep dive is now inline accordion)

// ═══════════════════════════════════════════════════════════════
// TAB: CITY GUIDE — static render (no weather dependency)
// ═══════════════════════════════════════════════════════════════

function renderCityGuideTab() {
  document.getElementById('cityguide-content').innerHTML = cityGuideHTML();
}

// ═══════════════════════════════════════════════════════════════
// TAB: WEATHER GUIDE — Changes + Travel Recommendation
// ═══════════════════════════════════════════════════════════════

function renderWeatherGuideTab(currentData, previousData) {
  document.getElementById('weather-content').innerHTML =
    `<div class="section-title">Changes</div>` +
    changesHTML(currentData, previousData) +
    `<div class="section-title">Travel Recommendation</div>` +
    travelHTML(currentData);
}

// ═══════════════════════════════════════════════════════════════
// TAB: BY DAY (city selector + slot filter, shows 10 days for a city)
// ═══════════════════════════════════════════════════════════════

let selectedCity     = 0;
let selectedSlotDay  = 0; // 0 = All

function renderByDayTab(data) {
  document.getElementById('city-pills').innerHTML = LOCATIONS.map((loc, i) =>
    `<span class="pill${i === selectedCity ? ' active' : ''}" onclick="selectCity(${i})">${loc.name}</span>`
  ).join('');

  document.getElementById('day-slot-pills').innerHTML = slotPillsHTML(selectedSlotDay, 'selectSlotDay');

  const locData = data[selectedCity];
  document.getElementById('day-content').innerHTML = locData
    ? locData.days.map(day => dayCardHTML(day, selectedSlotDay)).join('')
    : '<div class="no-changes">No data.</div>';
}

function selectCity(i) {
  selectedCity = i;
  const data = getCurrentData();
  if (data) renderByDayTab(data);
}

function selectSlotDay(i) {
  selectedSlotDay = i;
  const data = getCurrentData();
  if (data) renderByDayTab(data);
}

// ═══════════════════════════════════════════════════════════════
// TAB: BY CITY (day selector + slot filter, shows 10 cities for a day)
// ═══════════════════════════════════════════════════════════════

let selectedDay      = 0;
let selectedSlotCity = 0; // 0 = All

function renderByCityTab(data) {
  const days = data[0] ? data[0].days : [];
  document.getElementById('day-pills').innerHTML = days.map((d, i) =>
    `<span class="pill${i === selectedDay ? ' active' : ''}" onclick="selectDay(${i})">${formatDate(d.date)}</span>`
  ).join('');

  document.getElementById('city-slot-pills').innerHTML = slotPillsHTML(selectedSlotCity, 'selectSlotCity');

  document.getElementById('city-content').innerHTML = data.map(locData => {
    const day = locData.days[selectedDay];
    if (!day) return '';
    const slots = filteredSlots(day, selectedSlotCity);
    if (!slots.length) return '';
    return `<div class="card">
      <div class="card-header">${locData.location.name}<span class="sub">${locData.location.country}</span></div>
      ${slots.map(slotRowHTML).join('')}
    </div>`;
  }).join('');
}

function selectDay(i) {
  selectedDay = i;
  const data = getCurrentData();
  if (data) renderByCityTab(data);
}

function selectSlotCity(i) {
  selectedSlotCity = i;
  const data = getCurrentData();
  if (data) renderByCityTab(data);
}

// ═══════════════════════════════════════════════════════════════
// RENDER ALL TABS
// ═══════════════════════════════════════════════════════════════

function getCurrentData() {
  const raw = localStorage.getItem('weather_current');
  return raw ? buildAllData(JSON.parse(raw)) : null;
}

function getPreviousData() {
  const raw = localStorage.getItem('weather_previous');
  return raw ? buildAllData(JSON.parse(raw)) : null;
}

function renderAll() {
  const current  = getCurrentData();
  const previous = getPreviousData();

  // Update fetch bar metadata
  const fetchedAt = localStorage.getItem('weather_fetched_at');
  const prevFetchedAt = localStorage.getItem('weather_previous_fetched_at');
  const fmt = iso => new Date(iso).toLocaleString('en-GB', { dateStyle: 'short', timeStyle: 'short' });
  let timeText = fetchedAt ? 'Updated: ' + fmt(fetchedAt) : '';
  if (prevFetchedAt) timeText += '  ·  Prev: ' + fmt(prevFetchedAt);
  document.getElementById('fetch-time').textContent = timeText;

  const source = localStorage.getItem('weather_source') || '';
  const badge = document.getElementById('source-badge');
  badge.className = '';
  if (source === 'om')  { badge.textContent = 'Open-Meteo';  badge.className = 'om'; }
  if (source === 'met') { badge.textContent = 'MET Norway';  badge.className = 'met'; }

  renderCityGuideTab();
  renderWeatherGuideTab(current, previous);
  if (current) {
    renderByDayTab(current);
    renderByCityTab(current);
  }
}

// ═══════════════════════════════════════════════════════════════
// TAB SWITCHING
// ═══════════════════════════════════════════════════════════════

const TAB_NAMES = ['cityguide', 'weather', 'day', 'city'];

function showTab(name) {
  TAB_NAMES.forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === name);
    document.getElementById('btn-' + t).classList.toggle('active', t === name);
  });
}

// ═══════════════════════════════════════════════════════════════
// UI HELPERS
// ═══════════════════════════════════════════════════════════════

function showLoading(on) {
  document.getElementById('loading').classList.toggle('active', on);
}

function showError(msg) {
  const el = document.getElementById('error-banner');
  el.textContent = msg;
  el.classList.add('active');
}

function hideError() {
  document.getElementById('error-banner').classList.remove('active');
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════

window.addEventListener('load', async () => {
  if (!localStorage.getItem('weather_current')) {
    await doFetchOM(); // default to Open-Meteo on first load
  } else {
    renderAll();
  }
});
</script>
